---
- name: Zabbix precheck
  hosts: zabbix_server
  become: true
  gather_facts: true

  vars:
    zabbix_packages_common:
      - zabbix-server-pgsql
      - zabbix-server-mysql
      - zabbix-frontend-php
      - zabbix-apache-conf
      - zabbix-nginx-conf
      - zabbix-sql-scripts
      - zabbix-agent
      - zabbix-agent2

  tasks:
    - name: Show basic host summary
      debug:
        msg:
          - "Host: {{ ansible_facts['hostname'] }}"
          - "OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "Kernel: {{ ansible_facts['kernel'] }}"
          - "IPv4: {{ ansible_facts['default_ipv4']['address'] | default('N/A') }}"

    - name: Gather package facts
      package_facts:
        manager: auto

    - name: Gather service facts
      service_facts:

    - name: Check free space on /
      set_fact:
        root_mount: "{{ ansible_facts['mounts'] | selectattr('mount', 'equalto', '/') | list | first }}"
        var_mount: "{{ ansible_facts['mounts'] | selectattr('mount', 'equalto', '/var') | list | first | default({}) }}"
        tmp_mount: "{{ ansible_facts['mounts'] | selectattr('mount', 'equalto', '/tmp') | list | first | default({}) }}"

    - name: Assert free space on /
      assert:
        that:
          - "(root_mount.size_available / 1024 / 1024) | int >= precheck_required_free_mb_root"
        fail_msg: "Insufficient free space on /"
        success_msg: "Free space on / is OK"

    - name: Assert free space on /var when dedicated mount exists
      assert:
        that:
          - "(var_mount.size_available / 1024 / 1024) | int >= precheck_required_free_mb_var"
        fail_msg: "Insufficient free space on /var"
        success_msg: "Free space on /var is OK"
      when: var_mount.mount is defined

    - name: Assert free space on /tmp when dedicated mount exists
      assert:
        that:
          - "(tmp_mount.size_available / 1024 / 1024) | int >= precheck_required_free_mb_tmp"
        fail_msg: "Insufficient free space on /tmp"
        success_msg: "Free space on /tmp is OK"
      when: tmp_mount.mount is defined

    - name: Check if Zabbix config directory exists
      stat:
        path: "{{ zabbix_config_dir }}"
      register: zabbix_config_dir_stat

    - name: Check if Zabbix web directory exists
      stat:
        path: "{{ zabbix_web_dir }}"
      register: zabbix_web_dir_stat

    - name: Check zabbix_server.conf
      stat:
        path: "{{ zabbix_config_dir }}/zabbix_server.conf"
      register: zabbix_server_conf_stat

    - name: Check candidate Zabbix packages installed
      debug:
        msg: >-
          Installed package candidates:
          {{
            zabbix_packages_common
            | select('in', ansible_facts['packages'].keys() | list)
            | list
          }}

    - name: Check PHP modules for curl support
      shell: "php -m | grep -i '^curl$'"
      register: php_curl_module_check
      changed_when: false

    - name: Show PHP curl module check
      debug:
        var: php_curl_module_check.stdout

    - name: Assert PHP curl module is installed and active
      assert:
        that:
          - php_curl_module_check.rc == 0
        fail_msg: "PHP curl module is not installed or not active"
        success_msg: "PHP curl module is installed and active"

    - name: Check PHP cURL information
      shell: "php -i | grep -i 'cURL support\\|cURL Information' || true"
      register: php_curl_info
      changed_when: false

    - name: Show PHP cURL information
      debug:
        var: php_curl_info.stdout_lines

    - name: Test PostgreSQL access to Zabbix database
      shell: >
        sudo -u {{ postgresql_backup_user }}
        psql -d {{ zabbix_db_name }} -c '\dt'
      register: postgres_zabbix_db_check
      changed_when: false

    - name: Show PostgreSQL access check summary
      debug:
        msg:
          - "PostgreSQL DB access rc: {{ postgres_zabbix_db_check.rc }}"
          - "PostgreSQL DB access stdout lines captured: {{ postgres_zabbix_db_check.stdout_lines | length }}"

    - name: Assert PostgreSQL access to Zabbix database works
      assert:
        that:
          - postgres_zabbix_db_check.rc == 0
        fail_msg: "Could not access PostgreSQL database {{ zabbix_db_name }} as {{ postgresql_backup_user }}"
        success_msg: "PostgreSQL access to database {{ zabbix_db_name }} works"

    - name: Check backup root path exists
      stat:
        path: "{{ zabbix_backup_dir }}"
      register: zabbix_backup_root_stat

    - name: Assert backup root path exists
      assert:
        that:
          - zabbix_backup_root_stat.stat.exists
          - zabbix_backup_root_stat.stat.isdir
        fail_msg: "Backup root path {{ zabbix_backup_dir }} does not exist or is not a directory"
        success_msg: "Backup root path {{ zabbix_backup_dir }} exists"

    - name: Check free space on backup root filesystem
      shell: "df -Pm {{ zabbix_backup_dir }} | awk 'NR==2 {print $4}'"
      register: backup_root_free_mb
      changed_when: false

    - name: Show free space on backup root filesystem
      debug:
        msg:
          - "Backup path: {{ zabbix_backup_dir }}"
          - "Free MB on backup filesystem: {{ backup_root_free_mb.stdout }}"

    - name: Assert free space on backup filesystem
      assert:
        that:
          - backup_root_free_mb.stdout | int >= precheck_required_free_mb_backup
        fail_msg: "Free space on backup filesystem is below required threshold of {{ precheck_required_free_mb_backup }} MB"
        success_msg: "Free space on backup filesystem is OK"

    - name: Check zabbix-server service presence
      debug:
        msg: >-
          Known services matching zabbix:
          {{
            ansible_facts['services'].keys()
            | select('search', 'zabbix')
            | list
          }}

    - name: Check apt cache update works
      apt:
        update_cache: true
      changed_when: false

    - name: Check Zabbix log file permissions if present
      shell: "find /var/log/zabbix -maxdepth 1 -type f 2>/dev/null | xargs -r ls -l"
      register: zabbix_log_permissions
      changed_when: false

    - name: Show Zabbix log file permissions
      debug:
        var: zabbix_log_permissions.stdout_lines

    - name: Warn about potential log reader impact after 7.4 permission changes
      debug:
        msg:
          - "Review whether any external log readers, shippers, or monitoring processes depend on broader read permissions to /var/log/zabbix/*."
          - "Zabbix 7.4.x tightened permissions on several files to 0640 in some cases."
      when: zabbix_log_permissions.stdout | length > 0

    - name: Check backup directory parent exists
      stat:
        path: /opt
      register: opt_dir_stat

    - name: Assert critical paths exist
      assert:
        that:
          - zabbix_config_dir_stat.stat.exists
          - zabbix_server_conf_stat.stat.exists
          - opt_dir_stat.stat.exists
        fail_msg: "One or more critical paths are missing"
        success_msg: "Critical paths exist"

    - name: Print precheck summary
      debug:
        msg:
          - "Precheck completed successfully on {{ inventory_hostname }}"
          - "Config dir exists: {{ zabbix_config_dir_stat.stat.exists }}"
          - "Web dir exists: {{ zabbix_web_dir_stat.stat.exists }}"
          - "zabbix_server.conf exists: {{ zabbix_server_conf_stat.stat.exists }}"
          - "Backup path: {{ zabbix_backup_dir }}"
          - "Backup free MB: {{ backup_root_free_mb.stdout }}"
          - "PHP curl module active: {{ php_curl_module_check.rc == 0 }}"
          - "PostgreSQL DB access works: {{ postgres_zabbix_db_check.rc == 0 }}"
