[defaults]
inventory = ./inventory/staging.ini
roles_path = ./roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
callback_format_pretty = true
timeout = 30
forks = 10
gathering = smart
fact_caching = memory

[privilege_escalation]
become = False
become_method = sudo
become_user = root
